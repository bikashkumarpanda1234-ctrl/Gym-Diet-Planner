<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymDiet planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">GymDiet<span>Planner</span></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard"><i
          class="fa-solid fa-house"></i><span>Dashboard</span></button>
      <button class="nav-item" data-page="bmi"><i class="fa-solid fa-weight-scale"></i><span>BMI</span></button>
      <button class="nav-item" data-page="calories"><i class="fa-solid fa-fire"></i><span>Calories &
          Macros</span></button>
      <button class="nav-item" data-page="meal"><i class="fa-solid fa-utensils"></i><span>Meal Plan</span></button>
      <button class="nav-item" data-page="ai"><i class="fa-solid fa-robot"></i><span>AI Meal Advisor</span><span
          class="nav-badge">AI</span></button>
      <button class="nav-item" data-page="grocery"><i
          class="fa-solid fa-basket-shopping"></i><span>Grocery</span></button>
      <button class="nav-item" data-page="workout"><i class="fa-solid fa-dumbbell"></i><span>Workout</span></button>
      <button class="nav-item" data-page="measurements"><i
          class="fa-solid fa-ruler"></i><span>Measurements</span></button>
      <button class="nav-item" data-page="progress"><i class="fa-solid fa-chart-line"></i><span>Progress</span></button>
      <button class="nav-item" data-page="habits"><i class="fa-solid fa-droplet"></i><span>Habits</span></button>
      <button class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></button>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-theme" id="themeBtn" title="Toggle theme"><i class="fa-solid fa-moon"
          id="themeIcon"></i></button>
      <button class="btn-auth" id="authBtn">Login</button>
    </div>
  </aside>

  <!-- MOBILE HEADER -->
  <header class="mobile-header">
    <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
    <div class="mobile-logo">GymDiet<span>Pro</span></div>
    <button class="btn-theme-sm" id="themeBtnMobile"><i class="fa-solid fa-moon" id="themeIconMobile"></i></button>
  </header>

  <div class="sidebar-overlay hidden" id="sidebarOverlay"></div>

  <!-- MAIN CONTENT -->
  <main class="main" id="main"></main>

  <!-- AUTH MODAL -->
  <div class="modal-wrap hidden" id="authModal">
    <div class="modal">
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-xmark"></i></button>
      <div class="modal-tabs">
        <button class="mtab active" id="tabLogin">Sign In</button>
        <button class="mtab" id="tabReg">Register</button>
      </div>

      <div id="loginPanel">
        <h2>Welcome back</h2>
        <p class="muted mb20">Sign in to sync your fitness data.</p>


        <form id="loginForm">
          <div class="field"><label>Email</label><input type="email" id="lEmail" placeholder="you@email.com" required>
          </div>
          <div class="field"><label>Password</label>
            <div class="pw-row"><input type="password" id="lPass" placeholder="Password" required>
              <button type="button" class="eye" id="lEye"><i class="fa-solid fa-eye" id="lEyeI"></i></button>
            </div>
          </div>
          <p id="lMsg" class="fmsg"></p>
          <button type="submit" class="btn-main w100 mt12">Sign In <i class="fa-solid fa-arrow-right"></i></button>
        </form>
      </div>

      <div id="regPanel" class="hidden">
        <h2>Create account</h2>
        <p class="muted mb20">Free forever. No credit card.</p>
        <form id="regForm">
          <div class="field-row2">
            <div class="field"><label>Full Name</label><input type="text" id="rName" placeholder="Your name" required>
            </div>
            <div class="field"><label>Email</label><input type="email" id="rEmail" placeholder="you@email.com" required>
            </div>
          </div>
          <div class="field"><label>Password (min 6)</label>
            <div class="pw-row"><input type="password" id="rPass" placeholder="Password" required>
              <button type="button" class="eye" id="rEye"><i class="fa-solid fa-eye" id="rEyeI"></i></button>
            </div>
          </div>
          <div class="field-row2">
            <div class="field"><label>Age</label><input type="number" id="rAge" placeholder="25"></div>
            <div class="field"><label>Gender</label>
              <select id="rGender">
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="field"><label>Goal</label>
              <select id="rGoal">
                <option value="loss">Lose Fat</option>
                <option value="gain">Build Muscle</option>
                <option value="maintain">Maintain</option>
              </select>
            </div>
            <div class="field"><label>Activity Level</label>
              <select id="rActivity">
                <option value="low">Low (desk job)</option>
                <option value="medium">Medium (3-4x/wk)</option>
                <option value="high">High (daily intense)</option>
              </select>
            </div>
          </div>
          <p id="rMsg" class="fmsg"></p>
          <button type="submit" class="btn-main w100 mt12">Create Account <i
              class="fa-solid fa-arrow-right"></i></button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
